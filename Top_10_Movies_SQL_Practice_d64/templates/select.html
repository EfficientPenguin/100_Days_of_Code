{% extends 'base.html' %}

{% block title%}Select Movie{% endblock %}

{% block content %}
<div class="container">
    <h1 class="heading">Select Movie</h1>
    <p>
        <a href="#"> MOVIE TITLE - MOVIE RELEASE DATE</a>
    </p>
    <p>
        {% for movie in results: %}
        <a href=" {{  url_for('find_movie', movie_id=movie.id)  }} ">{{  movie.title  }} - {{  movie.release_date  }}</a><br>
        {% endfor %}
    </p>
</div>
{% endblock %}
