<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Rating</title>
</head>
<body>
    <label>Book Name: {{ book.title }}</label><br><br>
    <label>Current rating: {{  book.rating  }}</label><br><br>
    <form action="  {{  url_for('edit')  }}  " method="POST">
        <input type="text" name="new_rating" placeholder="New Rating"></input>
        <input hidden="hidden" name="id" value="{{ book.id }}">
        <button type="submit">Change Rating</button>
    </form>
</body>
</html>
