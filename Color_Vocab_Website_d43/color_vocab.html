<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Vocab</title>
    <link rel="stylesheet" href="./color_vocab_style.css" />
</head>
<body>
    <h1>Colors</h1>
    <h2>Learn the colors in Spanish!</h2>

    <h2 class="color-title" id="red">Rojo</h2>
    <img class="color" src="./squares/red-square.png" alt="red" />

    <h2 class="color-title" id="blue">Azul</h2>
    <img class="color" src="./squares/blue-square.png" alt="blue" />

    <h2 class="color-title" id="orange">Anaranjado</h2>
    <img class="color" src="./squares/orange-square.png" alt="orange" />
        
    <h2 class="color-title" id="green">Verde</h2>
    <img class="color" src="./squares/green-square.png" alt="green" />

    <h2 class="color-title" id="yellow">Amarillo</h2>
    <img class="color" src="./squares/yellow-square.png" alt="yellow" />


</body>
</html>
