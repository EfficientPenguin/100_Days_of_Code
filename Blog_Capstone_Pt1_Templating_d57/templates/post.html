<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Blog Post</title>
    <link rel="stylesheet" href="../static/post.css">
</head>
<body>
    <h1>Blog {{blog_id}} </h1>
    <div class="blog-post">
        <h1>{{blog_post['title']}}</h1>
        <h2>{{blog_post['subtitle']}}</h2>
        <h3>{{blog_post['body']}}</h3>
    </div>
</body>
</html>
