<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anchor Exercise</title>
</head>
<body>
    <header>
        <i>
            The goal of this exercise is to practice creating anchors for website links embedded within
            an ordered list.
        </i>

        <h1>My top 5 Favorite Websites</h1>
            <ol start="5">
                <li><a href="https://www.google.com">Google</a></li>
                <li><a href="https://www.youtube.com">YouTube</a></li>
                <li><a href="https://www.reddit.com">Reddit</a></li>
                <li><a href="https://www.marketwatch.com">Market Watch</a></li>
                <li><a href="https://www.lipsum.com">Lipsum</a></li>
            </ol>
    </header>
</body>
</html>
